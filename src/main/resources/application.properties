# ===== APP ======

spring.application.name=devflow


# ===== DATABASE =====

spring.datasource.url=jdbc:postgresql://localhost:5432/devflow
spring.datasource.username=devflow
spring.datasource.password=devflow
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== FLYWAY =====

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== REDIS =====

spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===== CACHE =====

spring.cache.type=none

# ===== ACTUATOR =====

management.endpoints.web.exposure.include=health,info


app.jwt.secret=404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

