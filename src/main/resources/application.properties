# ===== APP ======

spring.application.name=devflow


# ===== DATABASE =====

# spring.datasource.url=jdbc:postgresql://localhost:5432/devflow
# spring.datasource.username=devflow
# spring.datasource.password=devflow
# spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== FLYWAY =====

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== REDIS =====

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# ===== CACHE =====

spring.cache.type=none

# ===== ACTUATOR =====

management.endpoints.web.exposure.include=health,info


app.jwt.secret=404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Temporary Addition 

# spring.jpa.show-sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devflow}
spring.datasource.driver-class-name=org.postgresql.Driver


