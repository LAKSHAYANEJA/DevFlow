version: '3.8'

services:
  postgres:
    image: postgres:15.3
    container_name: devflow-postgres
    environment:
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow
      POSTGRES_DB: devflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

redis:
    image: redis:7-alpine
    container_name: devflow-redis
    ports:
      - "6379:6379"

app:
    build: .
    container_name: devflow-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devflow
      SPRING_DATASOURCE_USERNAME: devflow
      SPRING_DATASOURCE_PASSWORD: devflow
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: 404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970

      # DATABASE_URL: postgres://devflow:devflow@postgres:5432/devflow
      # REDIS_URL: redis://redis:6379
  
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: